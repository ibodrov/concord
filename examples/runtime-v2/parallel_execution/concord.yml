configuration:
  runtime: "concord-v2"

flows:
  default:

    # The parallel step runs flow branches in one process.
    - parallel:
        - ${sleep.ms(5000)}
        - ${sleep.ms(5000)}

    - log: "Total sleeping duration should be 5 seconds!"

    # sequence of tasks can be run inside the block statement of the parallel step
    - parallel:
        - block:
            - name: "HTTP Google Segment"
              task: http
              in:
                url: https://google.com/
                method: "GET"
              out: googleResponse
            - log: "Google: ${googleResponse.statusCode}"

        - block:
            - name: "HTTP Bing Segment"
              task: http
              in:
                url: https://bing.com/
                method: "GET"
              out: bingResponse
            - log: "Bing: ${bingResponse.statusCode}"

      out:
        - googleResponse
        - bingResponse

    - log: |
        Google: ${googleResponse}
        Bing: ${bingResponse}
