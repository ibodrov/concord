configuration:
  runtime: "concord-v2"

flows:
  default:

  - task: http
    in:
      method: POST
      url: ${url}
      headers:
        h1: "v1"
        h2: "v2"
      body:
        obj:
          nestedVar: 123
      request: json
      response: string
    out: rsp
  - log: "Success response: ${rsp.statusCode >= 200 and rsp.statusCode < 300}"
  - log: "Out Response: ${rsp.statusCode >= 200 and rsp.statusCode < 300}"
  - log: "Response content: ${rsp.content}"
