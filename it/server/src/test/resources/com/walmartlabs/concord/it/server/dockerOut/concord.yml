configuration:
  entryPoint: main
  arguments:
    name: "world"
  runtime: "concord-v2"

flows:
  main:
  - task: docker
    out: dockerResult
    in:
      image: ${image}
      debug: true
      forcePull: false
      saveOut: true
      cmd: echo "Hello, ${name}" && (>&2 echo "STDERR STILL WORKS")
  - log: "!! ${dockerResult.stdout.trim()} !!"
