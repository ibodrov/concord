configuration:
  runtime: "concord-v2"

flows:
  default:
  - log: "default flow..."

  onCronEvent:
  - log: "on Cron event"

  onGitEvent:
  - log: "on Git event"

triggers:
  - cron:
      spec: 30 * * * *
      entryPoint: onCronEvent

  - github:
      entryPoint: onGitEvent
      version: 2
      conditions:
        type: "push"

  - eventSource:
      version: 2
      entryPoint: default
      conditions:
        spec: "specs"
        param1: ".*123.*"
        param2: false
        param3: 123
      arguments:
         array:
          - val1
          - val2
