configuration:
  runtime: "concord-v2"

flows:
  default:
  - log: "initiator: ${initiator}"
  - task: concord
    in:
      action: fork
      apiKey: "{{apiKey}}"
      entryPoint: fork1
      sync: true
    out: jobOut

  - log: "Done! ${jobOut} is completed"

  fork1:
  - log: "initiator: ${initiator}"
