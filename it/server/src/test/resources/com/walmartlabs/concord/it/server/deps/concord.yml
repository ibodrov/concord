configuration:
  runtime: "concord-v2"

flows:
  main:
    - script: js
      body: |
        const ExampleBean = Java.type('com.walmartlabs.concord.plugins.example.ExampleBean');
        result.set('msg', new ExampleBean('Hello!').getValue());
      out:
        msg: ${result.msg}
    - log: "${msg}"
