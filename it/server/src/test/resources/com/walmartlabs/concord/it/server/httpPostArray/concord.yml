configuration:
  runtime: "concord-v2"

flows:
  default:

  - task: http
    in:
      method: POST
      url: ${url}
      auth:
        basic:
          username: ${user}
          password: ${password}
      body:
        - key: value
          one: two
      request: json
      response: json
    out: rsp
  - log: "Success response: ${rsp.statusCode >= 200 and rsp.statusCode < 300}"
  - log: "Out Response: ${rsp.statusCode >= 200 and rsp.statusCode < 300}"
