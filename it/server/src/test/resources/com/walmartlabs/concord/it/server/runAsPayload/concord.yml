configuration:
  runtime: "concord-v2"

flows:
  default:
    - log: "AAA: ${currentUser.username}"
    - form: myForm
      runAs:
        username: "${sudoUser}"
        keep: false
    - log: "BBB: ${myForm.msg}"
    - log: "CCC: ${currentUser.username}"

forms:
  myForm:
  - msg: { type: "string" }
