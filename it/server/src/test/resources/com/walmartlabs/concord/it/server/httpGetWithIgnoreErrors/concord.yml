configuration:
  runtime: "concord-v2"

flows:
  default:
  - task: http
    in:
     method: GET
     auth:
      basic:
        username: ${user}
        password: ${password}
     url: ${url}
     response: "json"
     ignoreErrors: true
    out: rsp

  - log: "statusCode: ${rsp.statusCode}"
  - log: "Success response: ${rsp.statusCode >= 200 and rsp.statusCode < 300}"
