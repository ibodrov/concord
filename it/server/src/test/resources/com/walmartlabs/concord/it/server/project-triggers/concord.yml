configuration:
  runtime: "concord-v2"

flows:
  onPush:
  - log: "onPush!"

triggers:
  - github:
      entryPoint: onPush
      version: 2
      conditions:
        type: "push"
        branch: "foo"
  - github:
      entryPoint: onPush
      version: 2
      conditions:
        type: "push"
        branch: "foo2"
