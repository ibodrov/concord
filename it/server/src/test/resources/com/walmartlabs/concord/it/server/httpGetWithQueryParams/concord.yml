flows:
  default:
  - try:
    - task: http
      in:
        method: GET
        url: ${url}
        query:
          message: "hello concord!"
          multiValue:
          - "value1"
          - "value2"
        response: json
      out: rsp
    - log: "Success response: ${rsp.statusCode >= 200 and rsp.statusCode < 300}"
    - log: "message: ${rsp.content.message}"
    - log: "multi-value-1: ${rsp.content.multiValue1}"
    - log: "multi-value-2: ${rsp.content.multiValue2}"
    error:
    - log: "Gotcha! ${lastError}"

configuration:
  runtime: "concord-v2"
  arguments:
    url: "http://localhost:8001"
