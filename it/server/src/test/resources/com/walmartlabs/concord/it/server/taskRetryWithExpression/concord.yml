configuration:
  runtime: "concord-v2"
  arguments:
    retryCount: 1
    retryDelay: 2
  dependencies:
    - mvn://com.walmartlabs.concord.plugins.basic:ansible-tasks:PROJECT_VERSION

flows:
  default:
  - task: ansible
    in:
      playbook: playbook/hello.yml
      inventory:
        local:
          hosts:
            - "127.0.0.1"
          vars:
            ansible_connection: local
    retry:
      in:
        retry: true
        extraVars:
          msg: "Hi retry!"
      times: ${retryCount}
      delay: ${retryDelay}
