flows:
  default:
  - log: "whoops"

  onTrigger:
  - log: "${msg}, ${name}"

  onInvalidTrigger:
  - log: "Oh no"

triggers:
  - testTrigger:
      entryPoint: onTrigger
      activeProfiles:
      - testProfile
      arguments:
        name: "Concord"

profiles:
  testProfile:
    configuration:
      arguments:
        msg: "Hello"
        name: "stranger"

configuration:
  runtime: "concord-v2"
  arguments:
    msg: "Bye"
