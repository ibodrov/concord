configuration:
  entryPoint: main
  arguments:
    name: "world"
  runtime: "concord-v2"

flows:
  main:
  - task: docker
    out: dockerResult
    in:
      image: ${image}
      debug: true
      forcePull: false
      saveErr: true
      cmd: echo "Hello, ${name}" && (>&2 echo "STDERR WORKS")

  - log: "STDERR: ${dockerResult.stderr}"
