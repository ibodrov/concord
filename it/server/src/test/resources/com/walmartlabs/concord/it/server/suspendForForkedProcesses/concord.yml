configuration:
  runtime: "concord-v2"

flows:
  default:
  - task: concord
    in:
      action: fork
      forks:
        - entryPoint: sayHello
        - entryPoint: sayHello
        - entryPoint: sayHello
      suspend: true
      sync: true
    out: forkResult
  - set:
      jobs: ${forkResult.ids}
  - log: "task completed"
  - log: "jobs ${jobs}"

  sayHello:
    - log: "Hello from a subprocess!"
    - ${sleep.ms(3000)}
