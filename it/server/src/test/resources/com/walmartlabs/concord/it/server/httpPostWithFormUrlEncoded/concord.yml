configuration:
  runtime: "concord-v2"

flows:
  default:

  - task: http
    in:
      method: POST
      url: ${url}
      request: form
      body:
        message: "Hello Concord!"
      response: json
    out: rsp
  - log: "Success response: ${rsp.statusCode >= 200 and rsp.statusCode < 300}"
  - log: "Out Response: ${rsp.statusCode >= 200 and rsp.statusCode < 300}"
