configuration:
  entryPoint: main
  arguments:
    name: "world"
  runtime: "concord-v2"

flows:
  main:
  - task: docker
    in:
      image: ${image}
      debug: true
      forcePull: false
      logOut: false
      logErr: false
      saveOut: true
      cmd: echo "Hello, ${name}" && (>&2 echo "STDERR WORKS")
