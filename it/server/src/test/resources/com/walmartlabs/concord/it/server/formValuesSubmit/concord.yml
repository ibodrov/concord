configuration:
  runtime: "concord-v2"

flows:
  default:
  - form: myForm
    values:
      a: 123
      b: "hello"
  - log: "we got ${myForm.a} ${myForm.b} ${myForm.c}"

forms:
  myForm:
  - a: {type: "int", value: 123, readonly: true}
  - b: {type: "string", value: "hello", readonly: true}
  - c: {type: "string", value: "234", readonly: true}
